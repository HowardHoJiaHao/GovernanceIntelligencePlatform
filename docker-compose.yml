version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    networks:
      - document_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - document_network
    depends_on:
      - backend

networks:
  document_network:
    driver: bridge