<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EGIP | Enterprise Governance Intelligence Platform</title>
  <!-- Bootstrap 5 + Icons + Fonts + Chart.js -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #F5F7FB; overflow-x: hidden; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
    :root {
      --bg-premium: #F5F7FB;
      --card-white: #FFFFFF;
      --text-primary: #1A1F36;
      --text-secondary: #5B6B79;
      --border-light: #E8ECF2;
      --accent-blue: #3B82F6;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
    }
    .floating-sidebar { position: fixed; left: 24px; top: 50%; transform: translateY(-50%); width: 100px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-radius: 44px; padding: 20px 0; box-shadow: var(--shadow-lg); border: 1px solid rgba(255, 255, 255, 0.5); z-index: 1000; transition: all 0.3s ease; }
    .sidebar-logo { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
    .sidebar-logo h3 { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #1A1F36 0%, #3B82F6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0; }
    .sidebar-item { display: flex; flex-direction: column; align-items: center; padding: 12px 0; margin: 4px 12px; border-radius: 28px; cursor: pointer; transition: all 0.2s ease; color: #8E9AAB; }
    .sidebar-item i { font-size: 22px; margin-bottom: 6px; }
    .sidebar-item span { font-size: 10px; font-weight: 500; }
    .sidebar-item:hover, .sidebar-item.active { background: var(--accent-blue); color: white; transform: scale(1.02); }
    .main-content { margin-left: 150px; padding: 32px 40px; max-width: calc(100% - 150px); }
    .premium-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 32px; }
    .header-actions { display: flex; gap: 16px; align-items: center; }
    .avatar-btn { width: 44px; height: 44px; background: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.2s; }
    .avatar-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-md); }
    .premium-card { background: var(--card-white); border-radius: 28px; padding: 24px; box-shadow: var(--shadow-sm); transition: all 0.25s ease; border: 1px solid var(--border-light); height: 100%; min-height: 380px; display: flex; flex-direction: column; }
    .premium-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card-header-premium { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; color: var(--text-primary); font-size: 1.1rem; }
    .upload-zone { border: 2px dashed var(--border-light); border-radius: 20px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #FAFCFE; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .upload-zone:hover { border-color: var(--accent-blue); background: #EFF6FF; }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-height: 500px; overflow-y: auto; padding-right: 8px; }
    .dept-card { background: #F8FAFC; border-radius: 16px; padding: 14px; border-left: 3px solid var(--accent-blue); }
    .dept-card h6 { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
    .dept-card ul { padding-left: 18px; margin-bottom: 0; }
    .dept-card li { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; }
    .ai-columns { display: flex; flex-direction: column; gap: 24px; }
    .ai-panel { background: white; border-radius: 24px; padding: 24px; border: 1px solid var(--border-light); min-height: 260px; }
    .source-item { background: #F8FAFC; border-radius: 16px; padding: 14px; margin-bottom: 12px; border-left: 3px solid var(--accent-blue); }
    .risk-low, .risk-medium, .risk-high, .risk-critical { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
    .risk-low { background: #ECFDF5; color: #059669; }
    .risk-medium { background: #FFFBEB; color: #D97706; }
    .risk-high { background: #FEF2F2; color: #DC2626; }
    .risk-critical { background: #FEF2F2; color: #991B1B; }
    .custom-tabs { display: flex; gap: 8px; background: white; padding: 6px; border-radius: 60px; width: fit-content; margin-bottom: 28px; box-shadow: var(--shadow-sm); }
    .tab-btn { padding: 10px 28px; border-radius: 40px; border: none; background: transparent; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); }
    .tab-btn.active { background: var(--accent-blue); color: white; }
    .data-table { width: 100%; }
    .data-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 10px 6px; }
    .data-table td { padding: 10px 6px; border-bottom: 1px solid var(--border-light); font-size: 0.75rem; }
    .scrollable-content { flex: 1; overflow-y: auto; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (max-width: 768px) { .floating-sidebar { left: 12px; width: 80px; } .sidebar-item span { display: none; } .main-content { margin-left: 110px; padding: 20px; max-width: calc(100% - 110px); } .dept-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="floating-sidebar">
  <div class="sidebar-logo"><h3>EGIP</h3></div>
  <div class="sidebar-item active" data-page="home"><i class="bi bi-house-door-fill"></i><span>Home</span></div>
  <div class="sidebar-item" data-page="folder"><i class="bi bi-folder2"></i><span>Folder</span></div>
  <div class="sidebar-item" data-page="ai-assistant"><i class="bi bi-cpu"></i><span>AI Studio</span></div>
  <div class="sidebar-item" data-page="admin"><i class="bi bi-gear"></i><span>Settings</span></div>
</div>

<main class="main-content" id="mainContent">
  <div class="premium-header">
    <div></div>
    <div class="header-actions">
      <div class="avatar-btn"><i class="bi bi-bell"></i></div>
      <div class="avatar-btn"><i class="bi bi-person-circle"></i></div>
    </div>
  </div>
  <div id="dynamicPage"></div>
</main>

<script>
  // API Configuration (leave empty to use mock data if backend not available)
  const API_BASE_URL = ''; // Set to 'http://localhost:5000/api' when backend is running
  
  // Department data
  const departmentDocs = {
    legal: { name: "Legal & Compliance", docs: ["Articles of Incorporation", "Corporate Bylaws", "Data Privacy Policies (GDPR/PDPR)", "Intellectual Property (IP) Policies", "Regulatory Compliance Registers"] },
    finance: { name: "Finance & Treasury", docs: ["Delegation of Authority (DoA) Matrix", "Anti-Money Laundering (AML) Policy", "Procurement and Purchasing Policies", "Internal Audit Frameworks", "Expense Reimbursement Rules"] },
    hr: { name: "Human Resources (HR)", docs: ["Employee Handbook", "Code of Conduct and Ethics", "Whistleblower Protection Policy", "Diversity, Equity, and Inclusion (DEI) Policy", "Disciplinary and Grievance Procedures"] },
    it: { name: "Information Technology (IT) & Security", docs: ["Information Security Policy (InfoSec)", "Acceptable Use Policy", "Disaster Recovery & Business Continuity Plans", "Access Control & Password Policies", "AI and Software Usage Guidelines"] },
    operations: { name: "Operations & Risk Management", docs: ["Standard Operating Procedures (SOPs)", "Corporate Risk Register", "Health, Safety, and Environment (HSE) Manual", "Vendor & Third-Party Management Policies", "Crisis Management Protocols"] },
    marketing: { name: "Marketing & Communications", docs: ["Social Media Policy", "Public Relations (PR) & Crisis Communication Guide", "Brand Guidelines & Trademark Usage", "Insider Trading / Market Disclosure Rules"] }
  };

  // Mock data for when backend is not available
  let auditLogs = [
    { user: "admin@egip.com", action: "Uploaded governance document", module: "Governance", timestamp: new Date().toISOString(), details: "" },
    { user: "compliance@egip.com", action: "Risk assessment updated", module: "Compliance", timestamp: new Date(Date.now() - 86400000).toISOString(), details: "" },
    { user: "procurement@egip.com", action: "Supplier evaluation completed", module: "Procurement", timestamp: new Date(Date.now() - 172800000).toISOString(), details: "" }
  ];

  let governanceFiles = [
    { name: "corporate_governance_framework.pdf", dept: "Legal", uploadedBy: "Board Secretariat", date: "2026-06-01", status: "Active" }
  ];
  let complianceFiles = [
    { name: "data_privacy_policy_v3.pdf", dept: "Legal", uploadedBy: "Compliance Officer", date: "2026-05-20", status: "Active" }
  ];
  let procurementFiles = [
    { name: "rfp_egip_platform.pdf", dept: "Procurement", uploadedBy: "Procurement Lead", date: "2026-05-15", status: "Active" }
  ];
  let users = [
    { id: 1, name: "admin@egip.com", role: "Admin" },
    { id: 2, name: "compliance@egip.com", role: "Compliance Officer" },
    { id: 3, name: "procurement@egip.com", role: "Procurement Lead" }
  ];

  // Helper functions
  function addAuditLog(user, action, module, details) {
    auditLogs.unshift({ user, action, module, details, timestamp: new Date().toISOString() });
    if (auditLogs.length > 100) auditLogs.pop();
  }

  // API calls (with fallback to mock)
  async function callAPI(endpoint, method = 'GET', body = null) {
    if (!API_BASE_URL) {
      console.warn('API_BASE_URL not configured, using mock data');
      return { error: 'API not configured' };
    }
    try {
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
      return await response.json();
    } catch (error) {
      console.warn('API call failed:', error);
      return { error: error.message };
    }
  }

  async function askAI(question) {
    if (API_BASE_URL) {
      const result = await callAPI('/ai/query', 'POST', { question });
      if (!result.error) return result;
    }
    // Mock response
    if (question.includes("RM75") || question.includes("approve")) {
      return { answer: "Project Manager limit is RM50,000. RM75,000 requires Department Head approval.", key_findings: "Authority Matrix section 4.2", reasoning: "Based on Delegation of Authority policy", risk_level: "Low", recommendation: "Escalate to Department Head", confidence: 96, sources: [{ title: "governance_framework.txt", relevance: 98 }] };
    } else if (question.includes("supplier")) {
      return { answer: "Supplier Alpha is recommended with 94% confidence.", key_findings: "Meets all ISO 27001 requirements", reasoning: "Within budget, 7+ years experience", risk_level: "Low", recommendation: "Select Supplier Alpha", confidence: 94, sources: [{ title: "supplier_evaluation.pdf", relevance: 94 }] };
    } else if (question.includes("High Risk")) {
      return { answer: "High Risk incident: data breach >10k records or financial loss >RM500k.", key_findings: "Notify CISO within 2 hours", reasoning: "Incident Response Framework", risk_level: "High", recommendation: "Activate incident response", confidence: 92, sources: [{ title: "risk_framework.txt", relevance: 96 }] };
    }
    return { answer: "I can assist with governance, compliance, procurement, and risk queries.", key_findings: "Query needs more context", reasoning: "Please provide more specific question", risk_level: "Info", recommendation: "Refine your question", confidence: 85, sources: [] };
  }

  // ========== PAGE RENDERERS ==========
  function renderHome() {
    setTimeout(() => {
      const ctx = document.getElementById("homeChart");
      if (ctx) new Chart(ctx, { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'AI Queries', data: [18, 24, 32, 41, 57, 62, 49], borderColor: '#3B82F6', tension: 0.3, fill: true, backgroundColor: 'rgba(59,130,246,0.05)' }] } });
    }, 100);
    return `
      <div class="row g-4">
        <div class="col-md-6 col-lg-3"><div class="premium-card"><div class="card-header-premium">Governance Overview</div><div class="display-4 fw-bold text-primary">87</div><div>Total Documents</div><div class="mt-3"><small>Authority: PM(RM50k) → DH(RM250k)</small></div></div></div>
        <div class="col-md-6 col-lg-3"><div class="premium-card"><div class="card-header-premium">Compliance Overview</div><div class="d-flex gap-1 flex-wrap"><span class="risk-low">Low 14</span><span class="risk-medium">Medium 9</span><span class="risk-high">High 5</span><span class="risk-critical">Critical 2</span></div><div class="mt-3">Score: 86%<div class="progress mt-1"><div class="progress-bar bg-success" style="width:86%"></div></div></div></div></div>
        <div class="col-md-6 col-lg-3"><div class="premium-card"><div class="card-header-premium">Procurement Overview</div><div><strong>Active Projects:</strong> 3</div><div><strong>Suppliers Review:</strong> 8</div><div class="mt-3 bg-light rounded-3 p-2"><strong>Recommended:</strong> Supplier Alpha (94%)</div></div></div>
        <div class="col-md-6 col-lg-3"><div class="premium-card"><div class="card-header-premium">AI Analytics</div><div class="display-4 fw-bold">142</div><div>Queries Today</div><div>Confidence: 92% | Response: 1.4s</div></div></div>
        <div class="col-md-12"><div class="premium-card"><div class="card-header-premium">AI Query Trends</div><canvas id="homeChart" height="200"></canvas></div></div>
      </div>
    `;
  }

  function renderFolder() {
    return `
      <div class="custom-tabs">
        <button class="tab-btn active" data-tab="governance">Governance</button>
        <button class="tab-btn" data-tab="compliance">Compliance</button>
        <button class="tab-btn" data-tab="procurement">Procurement</button>
      </div>
      <div id="tabContent">
        ${renderGovernanceTab()}
      </div>
    `;
  }

  function renderGovernanceTab() {
    return `<div class="row g-4"><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Upload Governance Documents</div><div class="upload-zone" id="govUploadZone"><i class="bi bi-cloud-upload fs-1"></i><p class="mt-2">Drag & drop or click to upload</p><small>PDF, DOCX, TXT</small><input type="file" id="govFileInput" style="display:none" accept=".pdf,.docx,.txt"></div><div id="govStatus" class="mt-2 small text-success"></div></div></div><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Repository</div><div class="scrollable-content"><div class="dept-grid">${Object.values(departmentDocs).map(dept => `<div class="dept-card"><h6>${dept.name}</h6><ul>${dept.docs.map(doc => `<li>${doc}</li>`).join('')}</ul></div>`).join('')}</div></div></div></div></div>`;
  }

  function renderComplianceTab() {
    return `<div class="row g-4"><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Upload Compliance Documents</div><div class="upload-zone" id="compUploadZone"><i class="bi bi-cloud-upload fs-1"></i><p class="mt-2">Upload policies, risk assessments</p><input type="file" id="compFileInput" style="display:none"></div><div id="compStatus" class="mt-2 small text-success"></div></div></div><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Compliance Overview</div><div class="mb-3"><span class="risk-low">Low 14</span> <span class="risk-medium">Medium 9</span> <span class="risk-high">High 5</span> <span class="risk-critical">Critical 2</span></div><div><strong>Policies:</strong> Data Privacy, Incident Response, Whistleblower</div><div><strong>Score:</strong> 86%</div><div class="progress mt-2"><div class="progress-bar bg-success" style="width:86%"></div></div><div class="mt-3"><strong>Documents:</strong><div id="compFileList">${complianceFiles.map(f => `<div class="source-item small">${f.name}</div>`).join('')}</div></div></div></div></div>`;
  }

  function renderProcurementTab() {
    return `<div class="row g-4"><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Upload Procurement Documents</div><div class="upload-zone" id="procUploadZone"><i class="bi bi-cloud-upload fs-1"></i><p class="mt-2">RFPs, contracts, evaluations</p><input type="file" id="procFileInput" style="display:none"></div><div id="procStatus" class="mt-2 small text-success"></div></div></div><div class="col-md-6"><div class="premium-card"><div class="card-header-premium">Procurement Intelligence</div><div><strong>Active Project:</strong> EGIP Platform</div><div><strong>Budget:</strong> RM 1,200,000</div><div><strong>Recommended:</strong> Supplier Alpha (94%)</div><div><strong>Requirements:</strong> ISO 27001, 5+ years, 24/7 Support</div><div class="mt-3"><strong>Documents:</strong><div id="procFileList">${procurementFiles.map(f => `<div class="source-item small">${f.name}</div>`).join('')}</div></div></div></div></div>`;
  }

  function renderAIAssistant() {
    return `
      <div class="premium-card mb-4"><h5 class="fw-semibold">Enterprise Intelligence Workspace</h5><div class="input-group mt-3"><input type="text" id="aiQuestion" class="form-control" placeholder="Ask about governance, compliance, suppliers, ESG, procurement, risk, approvals..."><button class="btn btn-primary" id="askBtn">Analyze</button></div></div>
      <div class="ai-columns">
        <div class="ai-panel"><h6><i class="bi bi-folder2-open me-2"></i>Sources Retrieved</h6><div id="sourcesList"><div class="text-secondary">Ask a question to see relevant sources...</div></div></div>
        <div class="ai-panel"><h6><i class="bi bi-cpu me-2"></i>AI Analysis</h6><div id="analysisContent"><div class="text-secondary">Ask a question to get AI analysis...</div></div></div>
        <div class="ai-panel"><h6><i class="bi bi-bar-chart me-2"></i>Decision Summary</h6><div id="decisionSummary"><div class="text-secondary">AI response will appear here...</div></div></div>
      </div>
      <div class="mt-4 premium-card"><h6>Suggested Questions</h6><div class="d-flex gap-2 flex-wrap mt-2">
        <button class="btn btn-outline-secondary btn-sm suggest" data-q="Can a Project Manager approve RM75,000?">Project Manager approval RM75k</button>
        <button class="btn btn-outline-secondary btn-sm suggest" data-q="Which supplier best fulfills Project A requirements?">Best supplier for Project A</button>
        <button class="btn btn-outline-secondary btn-sm suggest" data-q="What is High Risk according to policy?">High Risk definition</button>
      </div></div>
    `;
  }

  function renderAdmin() {
    return `
      <div class="ai-columns">
        <div class="ai-panel"><h5><i class="bi bi-people me-2"></i>User Management</h5><button class="btn btn-primary btn-sm mb-3" id="addUserBtn">+ Add User</button><div class="table-responsive"><table class="data-table"><thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead><tbody id="userTableBody">${users.map(u => `<tr><td>${u.name}</td><td>${u.role}</td><td><button class="btn btn-sm btn-outline-danger delete-user" data-id="${u.id}">Delete</button></td></tr>`).join('')}</tbody></table></div></div>
        <div class="ai-panel"><h5><i class="bi bi-journal-text me-2"></i>Audit Logs</h5><div class="table-responsive"><table class="data-table"><thead><tr><th>User</th><th>Action</th><th>Module</th><th>Timestamp</th></tr></thead><tbody id="auditTableBody">${auditLogs.slice(0, 10).map(log => `<tr><td>${log.user}</td><td>${log.action}</td><td>${log.module}</td><td>${new Date(log.timestamp).toLocaleString()}</td></tr>`).join('')}</tbody><tr></div></div>
        <div class="ai-panel"><h5><i class="bi bi-database me-2"></i>Knowledge Management</h5><div><strong>Total Documents:</strong> ${governanceFiles.length + complianceFiles.length + procurementFiles.length}</div><div><strong>Last Upload:</strong> ${new Date().toLocaleDateString()}</div><div><strong>Storage Used:</strong> 124 MB / 5 GB</div></div>
        <div class="ai-panel"><h5><i class="bi bi-gear me-2"></i>System Configuration</h5><div><strong>AI Model:</strong> Gemini 1.5 Pro / Ollama</div><div><strong>Vector DB:</strong> ChromaDB (Connected)</div><div><strong>Status:</strong> <span class="text-success">● Operational</span></div></div>
      </div>
    `;
  }

  // ========== PAGE LOADING WITH EVENT HANDLERS ==========
  let currentPage = "home";

  function loadPage(page) {
    currentPage = page;
    let html = "";
    if (page === "home") html = renderHome();
    else if (page === "folder") html = renderFolder();
    else if (page === "ai-assistant") html = renderAIAssistant();
    else html = renderAdmin();
    document.getElementById("dynamicPage").innerHTML = html;

    // Attach event handlers based on page
    if (page === "folder") {
      // Tab switching
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          const tab = btn.dataset.tab;
          if (tab === "governance") document.getElementById("tabContent").innerHTML = renderGovernanceTab();
          else if (tab === "compliance") document.getElementById("tabContent").innerHTML = renderComplianceTab();
          else document.getElementById("tabContent").innerHTML = renderProcurementTab();
          attachUploadEvents();
        });
      });
      attachUploadEvents();
    }
    
    if (page === "ai-assistant") {
      const askBtn = document.getElementById("askBtn");
      const aiQuestion = document.getElementById("aiQuestion");
      
      askBtn?.addEventListener("click", async () => {
        const question = aiQuestion.value;
        if (!question) return;
        
        document.getElementById("analysisContent").innerHTML = '<div class="loading"></div> Analyzing...';
        document.getElementById("sourcesList").innerHTML = '<div class="loading"></div> Retrieving sources...';
        
        const response = await askAI(question);
        
        document.getElementById("analysisContent").innerHTML = `
          <p><strong>Key Findings:</strong> ${response.key_findings || response.answer.substring(0, 100)}</p>
          <p><strong>Reasoning:</strong> ${response.reasoning || 'Based on governance frameworks'}</p>
          <p><strong>Risk Assessment:</strong> ${response.risk_level || 'Low'}</p>
          <p><strong>Recommendation:</strong> ${response.recommendation || response.answer.substring(0, 80)}</p>
        `;
        
        document.getElementById("sourcesList").innerHTML = (response.sources || []).map(s => 
          `<div class="source-item">${s.title || s} <span class="badge bg-primary float-end">${s.relevance || 92}%</span></div>`
        ).join('');
        
        document.getElementById("decisionSummary").innerHTML = `
          <div><strong>Confidence:</strong> ${response.confidence || 92}%</div>
          <div><strong>Risk Level:</strong> ${response.risk_level || 'Low'}</div>
          <div><strong>Recommendation:</strong> ${response.recommendation || 'Proceed'}</div>
          <div><strong>Response Time:</strong> 1.3s</div>
          <div><strong>Sources:</strong> ${(response.sources || []).length}</div>
        `;
        
        addAuditLog('user@egip.com', `AI Query: ${question.substring(0, 50)}`, 'AI Assistant', `Confidence: ${response.confidence || 92}%`);
      });
      
      document.querySelectorAll(".suggest").forEach(btn => {
        btn.addEventListener("click", () => {
          aiQuestion.value = btn.dataset.q;
          askBtn.click();
        });
      });
    }
    
    if (page === "admin") {
      document.getElementById("addUserBtn")?.addEventListener("click", () => {
        const name = prompt("Enter email:");
        if (name) {
          users.push({ id: users.length + 1, name: name, role: "User" });
          loadPage("admin");
          addAuditLog("admin@egip.com", `Added user: ${name}`, "Admin", "");
        }
      });
      document.querySelectorAll(".delete-user").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const id = parseInt(btn.dataset.id);
          users = users.filter(u => u.id !== id);
          loadPage("admin");
          addAuditLog("admin@egip.com", `Deleted user ID: ${id}`, "Admin", "");
        });
      });
    }
  }

  function attachUploadEvents() {
    const govZone = document.getElementById("govUploadZone");
    if (govZone) {
      govZone.onclick = () => document.getElementById("govFileInput")?.click();
      document.getElementById("govFileInput")?.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          governanceFiles.push({ name: e.target.files[0].name, dept: "Legal", uploadedBy: "User", date: new Date().toISOString().slice(0,10), status: "Pending" });
          loadPage("folder");
          addAuditLog("user@egip.com", `Uploaded: ${e.target.files[0].name}`, "Governance", "");
        }
      });
    }
    const compZone = document.getElementById("compUploadZone");
    if (compZone) {
      compZone.onclick = () => document.getElementById("compFileInput")?.click();
      document.getElementById("compFileInput")?.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          complianceFiles.push({ name: e.target.files[0].name, dept: "Legal", uploadedBy: "User", date: new Date().toISOString().slice(0,10), status: "Active" });
          loadPage("folder");
        }
      });
    }
    const procZone = document.getElementById("procUploadZone");
    if (procZone) {
      procZone.onclick = () => document.getElementById("procFileInput")?.click();
      document.getElementById("procFileInput")?.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          procurementFiles.push({ name: e.target.files[0].name, dept: "Procurement", uploadedBy: "User", date: new Date().toISOString().slice(0,10), status: "Active" });
          loadPage("folder");
        }
      });
    }
  }

  // Sidebar Navigation - FIXED: proper event binding
  document.querySelectorAll(".sidebar-item").forEach(item => {
    item.addEventListener("click", (e) => {
      e.preventDefault();
      const page = item.getAttribute("data-page");
      document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
      item.classList.add("active");
      loadPage(page);
    });
  });

  // Load home page
  loadPage("home");
</script>
</body>
</html>
