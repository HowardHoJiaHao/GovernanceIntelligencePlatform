<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EGIP | Enterprise Governance Intelligence Platform</title>
  <!-- Bootstrap 5 + Icons + Fonts + Chart.js -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #F5F7FB; overflow-x: hidden; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
    :root {
      --bg-premium: #F5F7FB;
      --card-white: #FFFFFF;
      --text-primary: #1A1F36;
      --text-secondary: #5B6B79;
      --border-light: #E8ECF2;
      --accent-blue: #3B82F6;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
    }
    .floating-sidebar { position: fixed; left: 24px; top: 50%; transform: translateY(-50%); width: 100px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-radius: 44px; padding: 20px 0; box-shadow: var(--shadow-lg); border: 1px solid rgba(255, 255, 255, 0.5); z-index: 1000; transition: all 0.3s ease; }
    .sidebar-logo { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
    .sidebar-logo h3 { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #1A1F36 0%, #3B82F6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0; }
    .sidebar-item { display: flex; flex-direction: column; align-items: center; padding: 12px 0; margin: 4px 12px; border-radius: 28px; cursor: pointer; transition: all 0.2s ease; color: #8E9AAB; }
    .sidebar-item i { font-size: 22px; margin-bottom: 6px; }
    .sidebar-item span { font-size: 10px; font-weight: 500; }
    .sidebar-item:hover, .sidebar-item.active { background: var(--accent-blue); color: white; transform: scale(1.02); }
    .main-content { margin-left: 150px; padding: 32px 40px; max-width: calc(100% - 150px); }
    .premium-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 32px; }
    .header-actions { display: flex; gap: 16px; align-items: center; }
    .avatar-btn { width: 44px; height: 44px; background: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.2s; }
    .avatar-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-md); }
    .premium-card { background: var(--card-white); border-radius: 28px; padding: 24px; box-shadow: var(--shadow-sm); transition: all 0.25s ease; border: 1px solid var(--border-light); height: 100%; min-height: 380px; display: flex; flex-direction: column; }
    .premium-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .card-header-premium { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; color: var(--text-primary); font-size: 1.1rem; }
    .upload-zone { border: 2px dashed var(--border-light); border-radius: 20px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #FAFCFE; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .upload-zone:hover { border-color: var(--accent-blue); background: #EFF6FF; }
    .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-height: 500px; overflow-y: auto; padding-right: 8px; }
    .dept-card { background: #F8FAFC; border-radius: 16px; padding: 14px; border-left: 3px solid var(--accent-blue); }
    .dept-card h6 { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
    .dept-card ul { padding-left: 18px; margin-bottom: 0; }
    .dept-card li { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; }
    .ai-columns { display: flex; flex-direction: column; gap: 24px; }
    .ai-panel { background: white; border-radius: 24px; padding: 24px; border: 1px solid var(--border-light); min-height: 260px; }
    .source-item { background: #F8FAFC; border-radius: 16px; padding: 14px; margin-bottom: 12px; border-left: 3px solid var(--accent-blue); }
    .risk-low, .risk-medium, .risk-high, .risk-critical { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; }
    .risk-low { background: #ECFDF5; color: #059669; }
    .risk-medium { background: #FFFBEB; color: #D97706; }
    .risk-high { background: #FEF2F2; color: #DC2626; }
    .risk-critical { background: #FEF2F2; color: #991B1B; }
    .custom-tabs { display: flex; gap: 8px; background: white; padding: 6px; border-radius: 60px; width: fit-content; margin-bottom: 28px; box-shadow: var(--shadow-sm); }
    .tab-btn { padding: 10px 28px; border-radius: 40px; border: none; background: transparent; font-weight: 500; transition: all 0.2s; color: var(--text-secondary); }
    .tab-btn.active { background: var(--accent-blue); color: white; }
    .data-table { width: 100%; }
    .data-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 10px 6px; }
    .data-table td { padding: 10px 6px; border-bottom: 1px solid var(--border-light); font-size: 0.75rem; }
    .scrollable-content { flex: 1; overflow-y: auto; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .chat-bubble-user { background: var(--accent-blue); color: white; padding: 10px 16px; border-radius: 20px; border-bottom-right-radius: 4px; max-width: 80%; margin-left: auto; }
    .chat-bubble-bot { background: #F1F5F9; color: var(--text-primary); padding: 10px 16px; border-radius: 20px; border-bottom-left-radius: 4px; max-width: 80%; }
    .chat-history-container { max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
    
    /* Structured message styling for bot responses */
    .structured-message {
      background: #F1F5F9;
      border-radius: 20px;
      border-bottom-left-radius: 6px;
      padding: 16px 20px;
      max-width: 85%;
    }
    .structured-section {
      margin-bottom: 14px;
    }
    .structured-section strong {
      color: var(--accent-blue);
      display: block;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .structured-section p {
      margin: 0;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--text-primary);
    }
    .risk-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .risk-badge.low { background: #ECFDF5; color: #059669; }
    .risk-badge.medium { background: #FFFBEB; color: #D97706; }
    .risk-badge.high { background: #FEF2F2; color: #DC2626; }
    .risk-badge.critical { background: #FEF2F2; color: #991B1B; }
    .chat-sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    
    /* Document list styling */
    .document-item {
      background: #F8FAFC;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      border-left: 3px solid var(--accent-blue);
    }
    .upload-status {
      margin-top: 10px;
      font-size: 0.75rem;
    }
    
    @media (max-width: 768px) { .floating-sidebar { left: 12px; width: 80px; } .sidebar-item span { display: none; } .main-content { margin-left: 110px; padding: 20px; max-width: calc(100% - 110px); } .dept-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="floating-sidebar">
  <div class="sidebar-logo"><h3>EGIP</h3></div>
  <div class="sidebar-item active" data-page="home"><i class="bi bi-house-door-fill"></i><span>Home</span></div>
  <div class="sidebar-item" data-page="folder"><i class="bi bi-folder2"></i><span>Folder</span></div>
  <div class="sidebar-item" data-page="ai-assistant"><i class="bi bi-cpu"></i><span>AI Studio</span></div>
  <div class="sidebar-item" data-page="admin"><i class="bi bi-gear"></i><span>Settings</span></div>
</div>

<main class="main-content" id="mainContent">
  <div class="premium-header">
    <div></div>
    <div class="header-actions">
      <div class="avatar-btn"><i class="bi bi-bell"></i></div>
      <div class="avatar-btn"><i class="bi bi-person-circle"></i></div>
    </div>
  </div>
  <div id="dynamicPage"></div>
</main>

<script>
  // API Configuration
  const API_BASE_URL = 'http://localhost:5001/api';
  
  // Hardcoded Repository Data (remains as is for Governance tab)
  const departmentDocs = {
    legal: { name: "Legal & Compliance", docs: ["Articles of Incorporation", "Corporate Bylaws", "Data Privacy Policies (GDPR/PDPR)", "Intellectual Property (IP) Policies", "Regulatory Compliance Registers"] },
    finance: { name: "Finance & Treasury", docs: ["Delegation of Authority (DoA) Matrix", "Anti-Money Laundering (AML) Policy", "Procurement and Purchasing Policies", "Internal Audit Frameworks", "Expense Reimbursement Rules"] },
    hr: { name: "Human Resources (HR)", docs: ["Employee Handbook", "Code of Conduct and Ethics", "Whistleblower Protection Policy", "Diversity, Equity, and Inclusion (DEI) Policy", "Disciplinary and Grievance Procedures"] },
    it: { name: "Information Technology (IT) & Security", docs: ["Information Security Policy (InfoSec)", "Acceptable Use Policy", "Disaster Recovery & Business Continuity Plans", "Access Control & Password Policies", "AI and Software Usage Guidelines"] },
    operations: { name: "Operations & Risk Management", docs: ["Standard Operating Procedures (SOPs)", "Corporate Risk Register", "Health, Safety, and Environment (HSE) Manual", "Vendor & Third-Party Management Policies", "Crisis Management Protocols"] },
    marketing: { name: "Marketing & Communications", docs: ["Social Media Policy", "Public Relations (PR) & Crisis Communication Guide", "Brand Guidelines & Trademark Usage", "Insider Trading / Market Disclosure Rules"] }
  };

  // Store documents fetched from backend
  let backendDocuments = {
    governance: [],
    compliance: [],
    procurement: []
  };
  
  let auditLogs = [];
  let users = [
    { id: 1, name: "admin@egip.com", role: "Admin" },
    { id: 2, name: "compliance@egip.com", role: "Compliance Officer" },
    { id: 3, name: "procurement@egip.com", role: "Procurement Lead" }
  ];
  
  // Global persistent chat history for AI Studio
  let globalChatHistory = [];
  let homeRefreshInterval = null;
  let currentHomeChart = null;

  function formatDateDDMMYYYY(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-GB');
  }

  function addAuditLog(user, action, module, details) {
    const newLog = { user, action, module, details, timestamp: new Date().toISOString() };
    auditLogs.unshift(newLog);
    if (auditLogs.length > 100) auditLogs.pop();
    callAPI('/audit/log', 'POST', { user, action, module, details });
  }

  async function callAPI(endpoint, method = 'GET', body = null) {
    try {
      const options = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    } catch (error) {
      console.warn('API call failed:', error);
      return { error: error.message, offline: true };
    }
  }

  // Fetch all documents from backend
  async function fetchAllDocuments() {
    const result = await callAPI('/documents');
    if (!result.error && result.documents) {
      // Clear existing arrays
      backendDocuments = {
        governance: [],
        compliance: [],
        procurement: []
      };
      
      // Categorize documents
      for (const doc of result.documents) {
        if (doc.category === 'compliance' || doc.category === 'Compliance') {
          backendDocuments.compliance.push(doc);
        } else if (doc.category === 'procurement' || doc.category === 'Procurement') {
          backendDocuments.procurement.push(doc);
        } else {
          backendDocuments.governance.push(doc);
        }
      }
    }
    return backendDocuments;
  }

  async function fetchRealTimeMetrics() {
    const result = await callAPI('/dashboard/metrics');
    if (!result.error) {
      // Also fetch documents to keep them in sync
      await fetchAllDocuments();
    }
    return result;
  }

  async function askAI(question) {
    const result = await callAPI('/ai/query', 'POST', { question });
    if (!result.error && result.answer) return result;
    
    return { 
      answer: "Unable to process request. Ollama service is not running. Please ensure Ollama is installed and running with: ollama serve",
      key_findings: "Service Unavailable",
      reasoning: "The local Ollama AI model is not responding. Please check if Ollama is installed and running.",
      risk_level: "Unknown",
      recommendation: "Install Ollama from https://ollama.ai and run 'ollama pull llama2' then 'ollama serve'",
      confidence: 0,
      sources: []
    };
  }

  // ========== PAGE RENDERERS ==========
  async function renderHome() {
    const metrics = await callAPI('/dashboard/metrics');
    const totalFiles = (metrics.governanceDocs || 0) + (metrics.complianceDocs || 0) + (metrics.procurementDocs || 0);
    
    return `
      <div class="row g-4">
        <div class="col-md-6 col-lg-3">
          <div class="premium-card">
            <div class="card-header-premium">Total Documents</div>
            <div class="display-1 fw-bold text-primary" style="font-size: 3rem;">${totalFiles}</div>
            <div>Total Files Across All Folders</div>
            <div class="mt-3 small text-muted">Governance: ${metrics.governanceDocs || 0} | Compliance: ${metrics.complianceDocs || 0} | Procurement: ${metrics.procurementDocs || 0}</div>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="premium-card">
            <div class="card-header-premium">Compliance Overview</div>
            <div class="d-flex gap-1 flex-wrap">
              <span class="risk-low">Low ${metrics.lowRisk || 0}</span>
              <span class="risk-medium">Medium ${metrics.mediumRisk || 0}</span>
              <span class="risk-high">High ${metrics.highRisk || 0}</span>
              <span class="risk-critical">Critical ${metrics.criticalRisk || 0}</span>
            </div>
            <div class="mt-3">Score: ${metrics.complianceScore || 0}%<div class="progress mt-1"><div class="progress-bar bg-success" style="width:${metrics.complianceScore || 0}%"></div></div></div>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="premium-card">
            <div class="card-header-premium">Procurement Overview</div>
            <div><strong>Active Projects:</strong> ${metrics.activeProjects || 0}</div>
            <div><strong>Suppliers Review:</strong> ${metrics.suppliersReview || 0}</div>
            <div class="mt-3 bg-light rounded-3 p-2"><strong>Recommended:</strong> ${metrics.recommendedSupplier || 'None'} (${metrics.confidence || 0}%)</div>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="premium-card">
            <div class="card-header-premium">AI Analytics</div>
            <div class="display-4 fw-bold">${metrics.aiQueriesToday || 0}</div>
            <div>Queries Today</div>
            <div>Confidence: ${metrics.avgConfidence || 0}% | Response: ${metrics.avgResponseTime || 0}s</div>
          </div>
        </div>
        <div class="col-md-12">
          <div class="premium-card">
            <div class="card-header-premium">AI Query Trends</div>
            <canvas id="homeChart" height="200"></canvas>
          </div>
        </div>
      </div>
    `;
  }

  function initHomeChart() {
    const canvas = document.getElementById("homeChart");
    if (!canvas) return;
    if (currentHomeChart) {
      currentHomeChart.destroy();
      currentHomeChart = null;
    }
    
    // Fetch real-time trend data for the chart
    callAPI('/dashboard/metrics').then(metrics => {
      currentHomeChart = new Chart(canvas, {
        type: 'line',
        data: {
          labels: metrics.trendLabels || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [{ 
            label: 'AI Queries', 
            data: metrics.trendData || [0, 0, 0, 0, 0, 0, 0], 
            borderColor: '#3B82F6', 
            tension: 0.3, 
            fill: true, 
            backgroundColor: 'rgba(59,130,246,0.05)' 
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true
        }
      });
    });
  }

  async function renderFolder() {
    // Fetch latest documents from backend
    await fetchAllDocuments();
    
    const totalGov = backendDocuments.governance.length;
    const totalComp = backendDocuments.compliance.length;
    const totalProc = backendDocuments.procurement.length;
    
    return `
      <div class="custom-tabs">
        <button class="tab-btn active" data-tab="governance">Governance (${totalGov})</button>
        <button class="tab-btn" data-tab="compliance">Compliance (${totalComp})</button>
        <button class="tab-btn" data-tab="procurement">Procurement (${totalProc})</button>
      </div>
      <div id="tabContent">
        ${await renderGovernanceTab()}
      </div>
    `;
  }

  async function renderGovernanceTab() {
    // Hardcoded Repository for Governance
    const hardcodedRepoHtml = Object.values(departmentDocs).map(dept => `
      <div class="dept-card">
        <h6>${dept.name}</h6>
        <ul>
          ${dept.docs.map(doc => `<li>${doc}</li>`).join('')}
        </ul>
      </div>
    `).join('');
    
    return `<div class="row g-4">
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Upload Governance Documents</div>
          <div class="upload-zone" id="govUploadZone">
            <i class="bi bi-cloud-upload fs-1"></i>
            <p class="mt-2">Drag & drop or click to upload</p>
            <small>PDF, DOCX, TXT</small>
            <input type="file" id="govFileInput" style="display:none" accept=".pdf,.docx,.txt">
          </div>
          <div id="govStatus" class="upload-status text-success"></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Repository</div>
          <div class="scrollable-content">
            <div class="dept-grid">
              ${hardcodedRepoHtml}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  async function renderComplianceTab() {
    // Real-time documents from backend for Compliance
    const complianceDocsList = backendDocuments.compliance.map(doc => 
      `<div class="document-item">
        <i class="bi bi-file-text me-2"></i>
        ${doc.filename || doc.name}
        <small class="text-muted ms-2">${doc.updated_at ? doc.updated_at.slice(0,10) : new Date().toISOString().slice(0,10)}</small>
      </div>`
    ).join('');
    
    return `<div class="row g-4">
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Upload Compliance Documents</div>
          <div class="upload-zone" id="compUploadZone">
            <i class="bi bi-cloud-upload fs-1"></i>
            <p class="mt-2">Upload policies, risk assessments</p>
            <input type="file" id="compFileInput" style="display:none">
          </div>
          <div id="compStatus" class="upload-status text-success"></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Compliance Documents (${backendDocuments.compliance.length})</div>
          <div class="scrollable-content" style="max-height: 400px; overflow-y: auto;">
            ${complianceDocsList || '<div class="text-muted text-center">No documents uploaded yet</div>'}
          </div>
        </div>
      </div>
    </div>`;
  }

  async function renderProcurementTab() {
    // Real-time documents from backend for Procurement
    const procurementDocsList = backendDocuments.procurement.map(doc => 
      `<div class="document-item">
        <i class="bi bi-file-text me-2"></i>
        ${doc.filename || doc.name}
        <small class="text-muted ms-2">${doc.updated_at ? doc.updated_at.slice(0,10) : new Date().toISOString().slice(0,10)}</small>
      </div>`
    ).join('');
    
    return `<div class="row g-4">
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Upload Procurement Documents</div>
          <div class="upload-zone" id="procUploadZone">
            <i class="bi bi-cloud-upload fs-1"></i>
            <p class="mt-2">RFPs, contracts, evaluations</p>
            <input type="file" id="procFileInput" style="display:none">
          </div>
          <div id="procStatus" class="upload-status text-success"></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="premium-card">
          <div class="card-header-premium">Procurement Documents (${backendDocuments.procurement.length})</div>
          <div class="scrollable-content" style="max-height: 400px; overflow-y: auto;">
            ${procurementDocsList || '<div class="text-muted text-center">No documents uploaded yet</div>'}
          </div>
        </div>
      </div>
    </div>`;
  }

  function renderAIAssistant() {
    return `
      <div class="premium-card mb-4" style="padding:0; border:none; background:transparent; box-shadow:none; min-height:auto;">
        <div class="row g-4">
          <div class="col-lg-7">
            <div class="chat-container" style="background: white; border-radius: 24px; border: 1px solid var(--border-light); height: 600px; display: flex; flex-direction: column; overflow: hidden;">
              <div class="chat-header p-3 border-bottom" style="background: #FAFCFE;">
                <h6 class="mb-0"><i class="bi bi-robot me-2"></i>EGIP AI Assistant</h6>
              </div>
              <div class="chat-messages" id="chatMessages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px;">
                <div class="text-secondary text-center mt-4">Ask a question to start the conversation...</div>
              </div>
              <div class="chat-input-area" style="padding:16px; border-top:1px solid var(--border-light); background:white;">
                <div class="input-group">
                  <input type="text" id="aiQuestion" class="form-control" placeholder="Ask about governance, compliance, suppliers, ESG, procurement, risk, approvals...">
                  <button class="btn btn-primary" id="askBtn"><i class="bi bi-send"></i> Analyze</button>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="right-panel" style="background: white; border-radius: 24px; border: 1px solid var(--border-light); padding: 20px; display: flex; flex-direction: column; gap: 20px; height: 600px; overflow-y: auto;">
              <div class="info-card" style="background: #F8FAFC; border-radius: 20px; padding: 16px;">
                <h6 style="font-size:0.85rem; font-weight:600; margin-bottom:12px;"><i class="bi bi-bar-chart me-2"></i>Decision Summary</h6>
                <div id="decisionSummary"><div class="text-secondary">AI response will appear here...</div></div>
              </div>
              <div class="info-card" style="background: #F8FAFC; border-radius: 20px; padding: 16px;">
                <h6 style="font-size:0.85rem; font-weight:600; margin-bottom:12px;"><i class="bi bi-folder2-open me-2"></i>Sources Retrieved</h6>
                <div id="sourcesList"><div class="text-secondary">Ask a question to see relevant sources...</div></div>
              </div>
              <div class="info-card" style="background: #F8FAFC; border-radius: 20px; padding: 16px;">
                <h6 style="font-size:0.85rem; font-weight:600; margin-bottom:12px;"><i class="bi bi-question-circle me-2"></i>Suggested Questions</h6>
                <div class="d-flex flex-wrap gap-2 mt-2">
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="Who can approve a RM50,000 project?">Who can approve RM50k?</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="Can a Project Manager approve RM75,000?">PM approve RM75k?</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="Which supplier best fulfills Project A requirements?">Best supplier</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="What is considered a High Risk incident?">High Risk definition</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="What are the ESG targets for 2026?">ESG targets 2026</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="What is the Delegation of Authority limit?">DoA limit</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="What ISO certifications are required?">ISO requirements</button>
                  <button class="btn suggest-btn suggest" style="font-size:0.7rem; padding:6px 12px; border-radius:20px; background:white; border:1px solid var(--border-light);" data-q="How to report a compliance violation?">Report violation</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAdmin() {
    return `
      <div class="ai-columns">
        <div class="ai-panel"><h5><i class="bi bi-people me-2"></i>User Management</h5><button class="btn btn-primary btn-sm mb-3" id="addUserBtn">+ Add User</button><div class="table-responsive"><table class="data-table"><thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead><tbody id="userTableBody">${users.map(u => `<tr><td>${u.name}</td><td>${u.role}</td><td><button class="btn btn-sm btn-outline-danger delete-user" data-id="${u.id}">Delete</button></td>`).join('')}</tbody></table></div></div>
        <div class="ai-panel"><h5><i class="bi bi-journal-text me-2"></i>User Actions & Timestamp</h5><div class="table-responsive"><table class="data-table"><thead><tr><th>User</th><th>Action</th><th>Module</th><th>Timestamp (DD/MM/YYYY)</th></tr></thead><tbody id="auditTableBody">${auditLogs.slice(0, 10).map(log => `<tr><td>${log.user}</td><td>${log.action}</td><td>${log.module || '-'}</td><td>${formatDateDDMMYYYY(log.timestamp)}</td>`).join('')}</tbody></table></div></div>
        <div class="ai-panel"><h5><i class="bi bi-database me-2"></i>Knowledge Management</h5><div><strong>Total Documents:</strong> <span id="totalDocsDisplay">${backendDocuments.governance.length + backendDocuments.compliance.length + backendDocuments.procurement.length}</span></div><div><strong>Last Upload:</strong> ${new Date().toLocaleDateString('en-GB')}</div></div>
        <div class="ai-panel"><h5><i class="bi bi-gear me-2"></i>System Configuration</h5><div><strong>AI Model:</strong> Ollama (Gemma2/Llama2)</div><div><strong>Backend:</strong> ${API_BASE_URL}</div><div><strong>Database:</strong> SQLite Connected</div></div>
      </div>
    `;
  }

  // ========== PAGE LOADING ==========
  let currentPage = "home";

  async function loadPage(page) {
    currentPage = page;
    let html = "";
    if (page === "home") {
      if (homeRefreshInterval) clearInterval(homeRefreshInterval);
      html = await renderHome();
      document.getElementById("dynamicPage").innerHTML = html;
      initHomeChart();
      homeRefreshInterval = setInterval(async () => {
        if (currentPage === "home") {
          const freshHtml = await renderHome();
          document.getElementById("dynamicPage").innerHTML = freshHtml;
          initHomeChart();
        }
      }, 10000);
    } else {
      if (homeRefreshInterval) {
        clearInterval(homeRefreshInterval);
        homeRefreshInterval = null;
      }
      if (page === "folder") {
        html = await renderFolder();
        document.getElementById("dynamicPage").innerHTML = html;
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const tab = btn.dataset.tab;
            if (tab === "governance") {
              document.getElementById("tabContent").innerHTML = await renderGovernanceTab();
            } else if (tab === "compliance") {
              document.getElementById("tabContent").innerHTML = await renderComplianceTab();
            } else {
              document.getElementById("tabContent").innerHTML = await renderProcurementTab();
            }
            attachUploadEvents();
          });
        });
        attachUploadEvents();
      } else if (page === "ai-assistant") {
        html = renderAIAssistant();
        document.getElementById("dynamicPage").innerHTML = html;
        setupAIAssistant();
      } else {
        html = renderAdmin();
        document.getElementById("dynamicPage").innerHTML = html;
        setupAdmin();
      }
    }
  }
  
  function setupAIAssistant() {
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function getRiskBadgeClass(riskLevel) {
      const level = (riskLevel || 'Low').toLowerCase();
      if (level === 'critical') return 'critical';
      if (level === 'high') return 'high';
      if (level === 'medium') return 'medium';
      return 'low';
    }
    
    function formatStructuredBotResponse(response) {
      const keyFindings = response.key_findings || response.answer?.substring(0, 300) || 'Analysis complete';
      const reasoning = response.reasoning || 'Based on governance frameworks and policy documents';
      const riskLevel = response.risk_level || 'Low';
      const recommendation = response.recommendation || response.answer?.substring(0, 200) || 'Refer to documents for full details';
      const confidence = (response.confidence !== undefined && response.confidence !== null) ? response.confidence : 0;
      const sources = response.sources || [];
      const riskBadgeClass = getRiskBadgeClass(riskLevel);
      
      return `
        <div class="structured-message">
          <div class="structured-section">
            <strong>Key Findings:</strong>
            <p>${escapeHtml(keyFindings)}</p>
          </div>
          <div class="structured-section">
            <strong>Reasoning:</strong>
            <p>${escapeHtml(reasoning)}</p>
          </div>
          <div class="structured-section">
            <strong>Risk Assessment:</strong>
            <p><span class="risk-badge ${riskBadgeClass}">${riskLevel}</span></p>
          </div>
          <div class="structured-section">
            <strong>Recommendation:</strong>
            <p>${escapeHtml(recommendation)}</p>
          </div>
          <div class="structured-section">
            <strong>Confidence Score:</strong>
            <div class="progress mt-1" style="height:6px;">
              <div class="progress-bar bg-success" style="width: ${confidence}%"></div>
            </div>
            <small class="text-muted">${confidence}%</small>
          </div>
          ${sources.length > 0 ? `
            <div class="chat-sources">
              <strong>Sources:</strong> ${sources.map(s => typeof s === 'string' ? s : s.title).join(', ')}
            </div>
          ` : ''}
        </div>
      `;
    }
    
    async function handleAsk() {
      const questionInput = document.getElementById('aiQuestion');
      const question = questionInput.value.trim();
      if (!question) return;
      questionInput.value = '';
      
      globalChatHistory.push({ role: 'user', content: question });
      renderMessages();
      
      document.getElementById('sourcesList').innerHTML = '<div class="loading"></div> Retrieving sources...';
      document.getElementById('decisionSummary').innerHTML = '<div class="loading"></div> Generating summary...';
      
      const response = await askAI(question);
      
      if (response.sources && response.sources.length > 0) {
        document.getElementById('sourcesList').innerHTML = response.sources.map(s => `
          <div class="source-item">
            <i class="bi bi-file-text me-2"></i>
            <strong>${escapeHtml(s.title || s)}</strong>
            <span class="badge bg-primary float-end">${s.relevance || 0}% relevance</span>
          </div>
        `).join('');
      } else {
        document.getElementById('sourcesList').innerHTML = '<div class="text-secondary">No specific sources retrieved for this query</div>';
      }
      
      const dynamicConfidence = (response.confidence !== undefined && response.confidence !== null) ? response.confidence : 0;
      const dynamicResponseTime = response.response_time || '0';
      
      document.getElementById('decisionSummary').innerHTML = `
        <div class="mb-2">
          <strong>Confidence Score:</strong>
          <div class="progress mt-1" style="height:8px;">
            <div class="progress-bar bg-success" style="width: ${dynamicConfidence}%"></div>
          </div>
          <span class="small">${dynamicConfidence}%</span>
        </div>
        <div class="mb-2">
          <strong>Risk Level:</strong> 
          <span class="risk-badge ${getRiskBadgeClass(response.risk_level)}">${response.risk_level || 'Unknown'}</span>
        </div>
        <div class="mb-2">
          <strong>Recommendation:</strong><br>
          <small>${escapeHtml(response.recommendation || 'No recommendation available')}</small>
        </div>
        <div class="mb-2">
          <strong>Response Time:</strong> ${dynamicResponseTime}s
        </div>
        <div>
          <strong>Sources Analyzed:</strong> ${response.sources?.length || 0}
        </div>
      `;
      
      const formattedBotMessage = formatStructuredBotResponse(response);
      globalChatHistory.push({ 
        role: 'bot', 
        content: formattedBotMessage,
        isStructured: true
      });
      
      renderMessages();
      addAuditLog('user@egip.com', `AI Query: ${question.substring(0, 50)}`, 'AI Studio', `Confidence: ${dynamicConfidence}% | Response Time: ${dynamicResponseTime}s`);
    }
    
    function renderMessages() {
      const container = document.getElementById('chatMessages');
      if (!container) return;
      
      if (globalChatHistory.length === 0) {
        container.innerHTML = '<div class="text-secondary text-center mt-4">Ask a question to start the conversation...</div>';
        return;
      }
      
      const messagesHtml = globalChatHistory.map(msg => {
        if (msg.role === 'user') {
          return `
            <div style="display:flex; justify-content:flex-end;">
              <div style="background:var(--accent-blue); color:white; padding:12px 18px; border-radius:22px; border-bottom-right-radius:6px; max-width:85%; word-wrap:break-word;">
                ${escapeHtml(msg.content)}
              </div>
            </div>
          `;
        } else {
          if (msg.isStructured) {
            return `<div style="display:flex; justify-content:flex-start;">${msg.content}</div>`;
          } else {
            return `
              <div style="display:flex; justify-content:flex-start;">
                <div style="background:#F1F5F9; padding:12px 18px; border-radius:22px; border-bottom-left-radius:6px; max-width:85%; word-wrap:break-word;">
                  ${escapeHtml(msg.content)}
                </div>
              </div>
            `;
          }
        }
      }).join('');
      
      container.innerHTML = messagesHtml;
      container.scrollTop = container.scrollHeight;
    }
    
    document.getElementById('askBtn')?.addEventListener('click', handleAsk);
    document.getElementById('aiQuestion')?.addEventListener('keypress', (e) => { 
      if(e.key === 'Enter') handleAsk(); 
    });
    document.querySelectorAll('.suggest').forEach(btn => {
      btn.addEventListener('click', () => {
        const qInput = document.getElementById('aiQuestion');
        if(qInput) { 
          qInput.value = btn.dataset.q; 
          handleAsk(); 
        }
      });
    });
    renderMessages();
  }
  
  function setupAdmin() {
    document.getElementById("addUserBtn")?.addEventListener("click", () => {
      const name = prompt("Enter email:");
      if (name) {
        users.push({ id: users.length + 1, name: name, role: "User" });
        loadPage("admin");
        addAuditLog("admin@egip.com", `Added user: ${name}`, "Admin", "");
      }
    });
    document.querySelectorAll(".delete-user").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.dataset.id);
        users = users.filter(u => u.id !== id);
        loadPage("admin");
        addAuditLog("admin@egip.com", `Deleted user ID: ${id}`, "Admin", "");
      });
    });
  }

  function attachUploadEvents() {
    // Governance Upload
    const govZone = document.getElementById("govUploadZone");
    if (govZone) {
      govZone.onclick = () => document.getElementById("govFileInput")?.click();
      document.getElementById("govFileInput")?.addEventListener("change", async (e) => {
        if (e.target.files[0]) {
          // Call backend to save document
          const formData = new FormData();
          formData.append('file', e.target.files[0]);
          formData.append('category', 'governance');
          
          try {
            await fetch(`${API_BASE_URL}/documents/upload`, {
              method: 'POST',
              body: formData
            });
            document.getElementById("govStatus").innerHTML = `<i class="bi bi-check-circle"></i> Uploaded: ${e.target.files[0].name}`;
            setTimeout(() => { document.getElementById("govStatus").innerHTML = ""; }, 3000);
            addAuditLog("user@egip.com", `Uploaded: ${e.target.files[0].name}`, "Governance", "");
            // Refresh folder view
            if (currentPage === "folder") {
              loadPage("folder");
            }
          } catch (error) {
            console.error('Upload failed:', error);
            document.getElementById("govStatus").innerHTML = `<i class="bi bi-exclamation-circle"></i> Upload failed`;
          }
        }
      });
    }
    
    // Compliance Upload
    const compZone = document.getElementById("compUploadZone");
    if (compZone) {
      compZone.onclick = () => document.getElementById("compFileInput")?.click();
      document.getElementById("compFileInput")?.addEventListener("change", async (e) => {
        if (e.target.files[0]) {
          const formData = new FormData();
          formData.append('file', e.target.files[0]);
          formData.append('category', 'compliance');
          
          try {
            await fetch(`${API_BASE_URL}/documents/upload`, {
              method: 'POST',
              body: formData
            });
            document.getElementById("compStatus").innerHTML = `<i class="bi bi-check-circle"></i> Uploaded: ${e.target.files[0].name}`;
            setTimeout(() => { document.getElementById("compStatus").innerHTML = ""; }, 3000);
            addAuditLog("user@egip.com", `Uploaded: ${e.target.files[0].name}`, "Compliance", "");
            if (currentPage === "folder") {
              loadPage("folder");
            }
          } catch (error) {
            console.error('Upload failed:', error);
          }
        }
      });
    }
    
    // Procurement Upload
    const procZone = document.getElementById("procUploadZone");
    if (procZone) {
      procZone.onclick = () => document.getElementById("procFileInput")?.click();
      document.getElementById("procFileInput")?.addEventListener("change", async (e) => {
        if (e.target.files[0]) {
          const formData = new FormData();
          formData.append('file', e.target.files[0]);
          formData.append('category', 'procurement');
          
          try {
            await fetch(`${API_BASE_URL}/documents/upload`, {
              method: 'POST',
              body: formData
            });
            document.getElementById("procStatus").innerHTML = `<i class="bi bi-check-circle"></i> Uploaded: ${e.target.files[0].name}`;
            setTimeout(() => { document.getElementById("procStatus").innerHTML = ""; }, 3000);
            addAuditLog("user@egip.com", `Uploaded: ${e.target.files[0].name}`, "Procurement", "");
            if (currentPage === "folder") {
              loadPage("folder");
            }
          } catch (error) {
            console.error('Upload failed:', error);
          }
        }
      });
    }
  }

  // Sidebar Navigation
  document.querySelectorAll(".sidebar-item").forEach(item => {
    item.addEventListener("click", (e) => {
      e.preventDefault();
      const page = item.getAttribute("data-page");
      document.querySelectorAll(".sidebar-item").forEach(i => i.classList.remove("active"));
      item.classList.add("active");
      loadPage(page);
    });
  });

  // Initial load
  loadPage("home");
</script>
</body>
</html>
